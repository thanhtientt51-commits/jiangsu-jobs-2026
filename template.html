<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江苏省2026年度公职招录 — 职位筛选系统</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --primary: #1a3a6b; --primary-light: #2a5298; --accent: #c41230;
  --accent-light: #fef0f0; --bg: #f3f4f6; --card: #fff;
  --text: #1a1a2e; --text-secondary: #6b7280; --border: #e5e7eb;
  --shadow: 0 1px 3px rgba(0,0,0,.08); --radius: 8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:var(--primary);color:#fff;padding:10px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header-inner{max-width:1500px;margin:0 auto}
.header h1{font-size:1.15em;font-weight:700;margin-bottom:6px}
.header h1 span{font-size:.58em;background:var(--accent);padding:2px 8px;border-radius:10px;font-weight:500;margin-left:5px;vertical-align:middle}
.header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.stats-bar{display:flex;gap:12px;font-size:.8em;flex-wrap:wrap}
.stats-bar .stat{text-align:center}
.stat .num{font-size:1.25em;font-weight:800}
.stat .lbl{font-size:.68em;opacity:.8}
.stat .num.hl{color:#fbbf24}
.type-toggle{display:flex;gap:4px}
.type-btn{padding:4px 14px;border-radius:14px;font-size:.75em;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.7);transition:.15s}
.type-btn.active{background:#fff;color:var(--primary);border-color:#fff}

.layout{max-width:1500px;margin:0 auto;display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 90px)}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:14px;overflow-y:auto;max-height:calc(100vh - 90px);position:sticky;top:80px}
.main{padding:14px 18px;overflow:hidden}

.filter-section{margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:8px}
.filter-section:last-child{border-bottom:0}
.filter-title{font-weight:700;font-size:.82em;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.filter-title::after{content:'\25BE';font-size:.6em;transition:.2s}
.filter-title.collapsed::after{transform:rotate(-90deg)}
.filter-body{max-height:260px;overflow-y:auto;transition:.2s}
.filter-body.collapsed{max-height:0;overflow:hidden}

.filter-option{display:flex;align-items:center;gap:5px;padding:3px;font-size:.78em;cursor:pointer;border-radius:4px;transition:.1s}
.filter-option:hover{background:#f0f4ff}
.filter-option input[type=checkbox]{accent-color:var(--primary)}
.filter-option .count{color:var(--text-secondary);font-size:.72em;margin-left:auto}
.filter-search{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:.76em;margin-bottom:4px;outline:none}
.filter-search:focus{border-color:var(--primary)}

.btn{display:inline-flex;align-items:center;gap:3px;padding:7px 14px;border-radius:var(--radius);font-size:.78em;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-light)}
.btn-outline{background:#fff;border-color:var(--border);color:var(--text)}.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:4px 8px;font-size:.7em}
.btn-group{display:flex;gap:4px;flex-wrap:wrap}

.search-box{margin-bottom:10px}
.search-box input{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius);font-size:.83em;outline:none;transition:.2s}
.search-box input:focus{border-color:var(--primary)}

.cat-pills{display:flex;flex-wrap:wrap;gap:3px}
.cat-pill{padding:2px 8px;border-radius:12px;font-size:.68em;cursor:pointer;background:var(--bg);border:1px solid var(--border);transition:.15s;user-select:none}
.cat-pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.cat-pill:hover:not(.active){border-color:var(--primary)}

.range-row{display:flex;align-items:center;gap:6px}
.range-row input{width:60px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-size:.78em;text-align:center}
.range-row span{font-size:.76em;color:var(--text-secondary)}

.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.results-count{font-weight:700;font-size:.88em}
.results-count em{color:var(--accent);font-style:normal}
.type-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:.75em;font-weight:600;margin-left:4px}
.type-gwy{background:#dbeafe;color:#1d4ed8}
.type-sydw{background:#fef3c7;color:#b45309}

table{width:100%;border-collapse:collapse;font-size:.78em;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
th{background:#f8fafc;padding:7px 5px;text-align:left;font-weight:700;font-size:.72em;color:var(--text-secondary);border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--primary)}
td{padding:6px 5px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover{background:#f8faff}
tr.expanded td{background:#f0f4ff}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:.7em;font-weight:700}
.badge-a,.badge-b,.badge-c{background:#dbeafe;color:#1d4ed8}
.badge-sydw{background:#fef3c7;color:#b45309}
.num-high{background:#fef2f2;color:var(--accent);font-weight:800;padding:1px 4px;border-radius:3px}
.expand-btn{cursor:pointer;color:var(--primary);font-size:.72em;font-weight:600;user-select:none;white-space:nowrap}
.expand-btn:hover{text-decoration:underline}
.detail-row{display:none}
.detail-row.show{display:table-row}
.detail-row td{background:#f8faff;font-size:.76em;padding:10px 14px;color:var(--text-secondary);line-height:1.7}
.detail-label{display:inline-block;background:var(--bg);padding:1px 6px;border-radius:4px;font-weight:600;color:var(--text);margin-right:3px;margin-bottom:3px}

.card-list{display:none}
.card{background:var(--card);border-radius:var(--radius);padding:10px;margin-bottom:8px;box-shadow:var(--shadow);border-left:3px solid var(--primary)}
.card.sydw-card{border-left-color:#f59e0b}
.card .card-title{font-weight:700;font-size:.85em;margin-bottom:4px}
.card .card-meta{display:flex;flex-wrap:wrap;gap:4px;font-size:.7em;color:var(--text-secondary);margin-bottom:3px}
.card .card-meta span{background:var(--bg);padding:2px 6px;border-radius:4px}

.empty{text-align:center;padding:50px 20px;color:var(--text-secondary)}
.loading{text-align:center;padding:40px;color:var(--text-secondary)}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.fav-btn{cursor:pointer;font-size:.95em;user-select:none;transition:.15s}
.fav-btn:hover{transform:scale(1.2)}.fav-btn.active{color:#f59e0b}
.action-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.filter-toggle{display:none;width:100%;padding:10px;background:var(--primary);color:#fff;border:0;border-radius:var(--radius);font-size:.83em;font-weight:700;cursor:pointer;margin-bottom:8px}
.filter-toggle .badge-count{background:var(--accent);padding:1px 6px;border-radius:8px;font-size:.78em;margin-left:5px}

/* Contact side bars */
.contact-left,.contact-right{position:fixed;top:50%;transform:translateY(-50%);z-index:50;writing-mode:vertical-lr;letter-spacing:3px;font-size:.75em;font-weight:600;background:var(--primary);color:#fff;padding:16px 10px;border-radius:0 8px 8px 0;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.15);transition:.2s;text-decoration:none;display:flex;align-items:center;gap:8px}
.contact-left{left:0}.contact-right{right:0;writing-mode:vertical-rl;border-radius:8px 0 0 8px}
.contact-left:hover,.contact-right:hover{background:var(--primary-light);padding:20px 12px}
.contact-icon{font-size:1.3em}

/* Floating inquiry button */
.float-inquiry{position:fixed;bottom:24px;right:24px;z-index:200;background:var(--accent);color:#fff;padding:14px 20px;border-radius:28px;font-weight:700;font-size:.85em;cursor:pointer;border:0;box-shadow:0 4px 20px rgba(196,18,48,.35);transition:.2s;display:flex;align-items:center;gap:8px;animation:pulse 2s infinite}
.float-inquiry:hover{transform:scale(1.05);box-shadow:0 6px 28px rgba(196,18,48,.5)}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(196,18,48,.35)}50%{box-shadow:0 4px 32px rgba(196,18,48,.6)}}

/* Hide Meiqia default button - JS handles this */

/* WeChat modal */
.wx-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;justify-content:center;align-items:center}
.wx-modal.show{display:flex}
.wx-card{background:#fff;border-radius:16px;padding:30px;text-align:center;max-width:360px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.wx-card h3{font-size:1.1em;margin-bottom:8px}
.wx-card .wxid{font-size:1.3em;font-weight:800;color:var(--primary);background:#f0f4ff;padding:10px 20px;border-radius:8px;margin:16px 0;letter-spacing:1px;user-select:all}
.wx-card .tip{font-size:.78em;color:var(--text-secondary);margin-bottom:12px}
.wx-card .btn-copy{background:var(--accent);color:#fff;border:0;padding:8px 24px;border-radius:20px;font-weight:700;cursor:pointer;font-size:.85em}
.wx-card .btn-close{background:0;border:0;color:var(--text-secondary);font-size:.8em;cursor:pointer;margin-top:12px;display:block;width:100%}

@media(max-width:768px){
  .contact-left,.contact-right{display:none}
  .float-inquiry{bottom:16px;right:12px;padding:12px 16px;font-size:.75em}
}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:fixed;top:80px;left:0;right:0;bottom:0;z-index:99;transform:translateX(-100%);transition:.25s;max-height:none;overflow-y:auto}
  .sidebar.open{transform:translateX(0)}
  .filter-toggle{display:block}
  .main{padding:8px}
  table{display:none}.card-list{display:block}
  .header h1{font-size:.95em}
  .stats-bar{gap:6px}.stat .num{font-size:1.05em}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>江苏省2026年度公职招录<span>公务员+事业单位</span></h1>
    <div class="header-row">
      <div class="stats-bar">
        <div class="stat"><div class="num" id="statPos">6,157</div><div class="lbl">总职位</div></div>
        <div class="stat"><div class="num" id="statRec">8,179</div><div class="lbl">总招录</div></div>
        <div class="stat"><div class="num hl" id="statMatch">6,157</div><div class="lbl">匹配</div></div>
      </div>
      <div class="type-toggle" id="typeToggle">
        <button class="type-btn active" data-type="all" onclick="setType('all',this)">全部</button>
        <button class="type-btn" data-type="gwy" onclick="setType('gwy',this)">公务员</button>
        <button class="type-btn" data-type="sydw" onclick="setType('sydw',this)">事业单位</button>
        <button class="type-btn" data-type="teacher" onclick="setType('teacher',this)">教师</button>
      </div>
    </div>
  </div>
</div>

<button class="filter-toggle" id="filterToggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
  筛选条件 <span class="badge-count" id="filterBadge" style="display:none">0</span>
</button>

<div class="layout">
  <aside class="sidebar open" id="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索职位/单位/专业..." oninput="onFilterChange()">
    </div>
    <div class="filter-section" style="padding-bottom:4px">
      <label class="filter-option" style="font-weight:600">
        <input type="checkbox" id="favOnly" onchange="onFilterChange()"> 仅看收藏
      </label>
    </div>
    <div class="filter-section">
      <div class="filter-title" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">地区</div>
      <div class="filter-body" id="cityFilters"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">专业大类</div>
      <div class="filter-body">
        <input class="filter-search" placeholder="搜索专业..." oninput="filterCategories(this.value)">
        <div class="cat-pills" id="majorFilters"></div>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-title" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">学历</div>
      <div class="filter-body" id="eduFilters"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">考试类别 / 岗位类别</div>
      <div class="filter-body btn-group" id="examFilters"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">隶属关系</div>
      <div class="filter-body" id="affilFilters"></div>
    </div>
    <div class="filter-section" id="fundingSection" style="display:none">
      <div class="filter-title" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">经费来源</div>
      <div class="filter-body" id="fundingFilters"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">招录人数</div>
      <div class="filter-body">
        <div class="range-row">
          <input type="number" id="recruitMin" min="1" value="1" onchange="onFilterChange()">
          <span>至</span>
          <input type="number" id="recruitMax" value="8" onchange="onFilterChange()">
        </div>
      </div>
    </div>
    <button class="btn btn-outline" style="width:100%;justify-content:center;margin-top:6px" onclick="resetFilters()">重置全部筛选</button>
  </aside>

  <main class="main">
    <div class="results-header">
      <div class="results-count" id="resultsCount">共 <em>6,157</em> 个职位</div>
      <div class="action-row">
        <button class="btn btn-outline btn-sm" onclick="exportToExcel()">导出Excel</button>
        <button class="btn btn-outline btn-sm" onclick="copyShareLink()">复制分享链接</button>
      </div>
    </div>
    <div id="tableView">
      <div class="loading" id="loadingMsg"><div class="spinner"></div>正在加载数据...</div>
      <table id="resultsTable" style="display:none">
        <thead><tr>
          <th style="width:26px"></th>
          <th data-sort="an" onclick="setSort('an')">地区</th>
          <th data-sort="_t" onclick="setSort('_t')" style="width:50px">类型</th>
          <th data-sort="un" onclick="setSort('un')">单位</th>
          <th data-sort="pn" onclick="setSort('pn')">职位名称</th>
          <th data-sort="e" onclick="setSort('e')" style="width:65px">类别</th>
          <th data-sort="n" onclick="setSort('n')" style="width:45px">招录</th>
          <th data-sort="ed" onclick="setSort('ed')" style="width:80px">学历</th>
          <th data-sort="m" onclick="setSort('m')" style="width:160px">专业</th>
          <th style="width:42px">详情</th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="card-list" id="cardList"></div>
  </main>
</div>

<!-- Contact Side Bars -->
<a class="contact-left" title="添加微信咨询" onclick="showWechat()">
  <span class="contact-icon">💬</span> 添加微信
</a>
<a class="contact-right" title="添加微信咨询" onclick="showWechat()">
  <span class="contact-icon">📱</span> KOl_Rabbit
</a>

<!-- Floating Inquiry Button -->
<button class="float-inquiry" onclick="openChat()">
  💬 在线咨询
</button>

<!-- WeChat Modal -->
<div class="wx-modal" id="wxModal" onclick="if(event.target===this)hideWechat()">
  <div class="wx-card">
    <h3>添加微信咨询</h3>
    <div class="tip">复制微信号添加好友</div>
    <div class="wxid" id="wxId">KOl_Rabbit</div>
    <button class="btn-copy" onclick="copyWechat()">📋 复制微信号</button>
    <button class="btn-close" onclick="hideWechat()">关闭</button>
  </div>
</div>

<script type='text/javascript'>
    (function(a, b, c, d, e, j, s) {
        a[d] = a[d] || function() {
            (a[d].a = a[d].a || []).push(arguments)
        };
        j = b.createElement(c),
            s = b.getElementsByTagName(c)[0];
        j.async = true;
        j.charset = 'UTF-8';
        j.src = 'https://visitor-static.meiqia.com/fe-widget-visitor/loader.js';
        s.parentNode.insertBefore(j, s);
    })(window, document, 'script', '_MEIQIA');
    _MEIQIA('entId', '57a1b4cbb3a5d0489e88d3598fd02bf2');
    _MEIQIA('allSet', function() {
      // Hide Meiqia default button, keep only our custom one
      var observer = new MutationObserver(function() {
        var btn = document.querySelector('#MEIQIA-BTN-BUBBLE, #_MEIQIA_BTN_BUBBLE, [id*=MEIQIA-BTN], [class*=meiqia-btn], [class*=meiqia-bubble], #meiqia-btn');
        if (btn) { btn.style.display = 'none'; observer.disconnect(); }
      });
      observer.observe(document.body, { childList: true, subtree: true });

</script>

<div style="text-align:center;padding:14px;color:var(--text-secondary);font-size:.66em">
  数据来源：江苏省2026年度考试录用公务员职位表 + 省属事业单位统一公开招聘岗位表 | 人工整理仅供参考
</div>

<script>
const ALL_DATA = {{DATA}};
const STATS = {{STATS}};

const state = {
  search: '', cities: new Set(), majors: new Set(), education: new Set(),
  exams: new Set(), affiliations: new Set(), recruitMin: 1,
  recruitMax: STATS.maxRecruit || 8, favOnly: false, sortBy: null, sortAsc: true,
  type: 'all', funding: new Set(),
};
const favorites = new Set(JSON.parse(localStorage.getItem('jsgk_fav2') || '[]'));
function saveFavs(){localStorage.setItem('jsgk_fav2',JSON.stringify([...favorites]));}

function syncStateFromDOM() {
  state.cities.clear(); state.majors.clear(); state.education.clear();
  state.exams.clear(); state.affiliations.clear(); state.funding.clear();
  document.querySelectorAll('#cityFilters input:checked').forEach(cb => state.cities.add(cb._val));
  document.querySelectorAll('#eduFilters input:checked').forEach(cb => state.education.add(cb._val));
  document.querySelectorAll('#affilFilters input:checked').forEach(cb => state.affiliations.add(cb._val));
  document.querySelectorAll('#fundingFilters input:checked').forEach(cb => state.funding.add(cb._val));
  document.querySelectorAll('#majorFilters .cat-pill.active').forEach(p => state.majors.add(p._val));
  document.querySelectorAll('#examFilters .btn.active').forEach(b => state.exams.add(b._val));
  state.search = document.getElementById('searchInput').value.trim();
  state.favOnly = document.getElementById('favOnly').checked;
  state.recruitMin = parseInt(document.getElementById('recruitMin').value) || 1;
  state.recruitMax = parseInt(document.getElementById('recruitMax').value) || STATS.maxRecruit;
}

function applyFilters(){
  let data = ALL_DATA;
  // Type filter
  if (state.type !== 'all') data = data.filter(r => r._t === state.type);
  if (state.favOnly) data = data.filter(r => favorites.has(r._t + '|' + r.pc + '|' + r.un));
  if (state.search) {
    const q = state.search.toLowerCase();
    data = data.filter(r => (r.un + r.pn + r.pd + r.m + r.an + r.o + (r._dept||'')).toLowerCase().includes(q));
  }
  if (state.cities.size) data = data.filter(r => state.cities.has(r._city || r.an));
  if (state.majors.size) data = data.filter(r => (r.mt||[]).some(t => state.majors.has(t)));
  if (state.education.size) data = data.filter(r => state.education.has(r.ed));
  if (state.exams.size) data = data.filter(r => state.exams.has(r.e));
  if (state.affiliations.size) data = data.filter(r => state.affiliations.has(r.a));
  if (state.funding.size) data = data.filter(r => state.funding.has(r._fund));
  data = data.filter(r => r.n >= state.recruitMin && r.n <= state.recruitMax);
  if (state.sortBy) {
    data.sort((a,b) => {
      let va = a[state.sortBy], vb = b[state.sortBy];
      if (state.sortBy === 'n') { va = +va; vb = +vb; }
      else { va = String(va); vb = String(vb); }
      const cmp = va < vb ? -1 : va > vb ? 1 : 0;
      return state.sortAsc ? cmp : -cmp;
    });
  }
  return data;
}

let renderTimer;
function render(){
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    syncStateFromDOM();
    const results = applyFilters();
    const totalRec = results.reduce((s,r) => s + r.n, 0);
    const gwyCount = results.filter(r => r._t === 'gwy').length;
    const sydwCount = results.filter(r => r._t === 'sydw').length;

    document.getElementById('statMatch').textContent = results.length.toLocaleString();
    const checkedCities = [...document.querySelectorAll('#cityFilters input:checked')].map(cb=>cb._val);
    document.getElementById('resultsCount').innerHTML = `共<em>${results.length.toLocaleString()}</em>个职位 (公务员${gwyCount}+事业${sydwCount})，招录<em>${totalRec}</em>人 <span style="font-size:.7em;color:#c41230">${checkedCities.length?' | 已选: '+checkedCities.join(', '):''}</span>`;

    const activeCount = state.cities.size + state.majors.size + state.education.size + state.exams.size + state.affiliations.size + state.funding.size + (state.favOnly?1:0) + (state.type!=='all'?1:0);
    const badge = document.getElementById('filterBadge');
    badge.textContent = activeCount;
    badge.style.display = activeCount > 0 ? 'inline' : 'none';

    // Toggle funding filter visibility
    document.getElementById('fundingSection').style.display = (state.type === 'sydw' || state.type === 'all') ? '' : 'none';

    // Table
    const tbody = document.getElementById('tableBody');
    if (!results.length) {
      tbody.innerHTML = '<tr><td colspan="10"><div class="empty">没有匹配的职位，请调整筛选条件</div></td></tr>';
    } else {
      const slice = results.slice(0, 500);
      tbody.innerHTML = slice.map((r, i) => {
        const isFav = favorites.has(r._t + '|' + r.pc + '|' + r.un);
        const isSydw = r._t === 'sydw';
        const nHigh = r.n >= 5 ? ' num-high' : '';
        return `<tr id="row-${i}">
          <td><span class="fav-btn${isFav?' active':''}" onclick="toggleFav('${r._t}|${r.pc}|${r.un}',this)">${isFav?'★':'☆'}</span></td>
          <td title="${r.an}">${r.an.length>5?r.an.substring(0,4)+'..':r.an}</td>
          <td><span class="type-badge ${isSydw?'type-sydw':'type-gwy'}">${isSydw?'事业':'公务员'}</span></td>
          <td title="${r.un}">${r.un.length>10?r.un.substring(0,8)+'..':r.un}</td>
          <td title="${r.pn}">${r.pn.length>12?r.pn.substring(0,10)+'..':r.pn}</td>
          <td><span class="badge ${isSydw?'badge-sydw':'badge-a'}">${r.e}</span></td>
          <td><span class="${nHigh}">${r.n}</span></td>
          <td>${r.ed}</td>
          <td title="${r.m}">${r.m.length>22?r.m.substring(0,20)+'..':r.m}</td>
          <td><span class="expand-btn" onclick="toggleDetail(${i},this)">展开</span></td>
        </tr>
        <tr class="detail-row" id="detail-${i}">
          <td colspan="10">
            <div><span class="detail-label">职位简介</span>${r.pd||'（无）'}</div>
            <div style="margin-top:4px"><span class="detail-label">专业</span>${r.m}</div>
            <div style="margin-top:4px"><span class="detail-label">其它</span>${r.o||'（无）'}&nbsp;<span class="detail-label">开考比</span>${r.r}&nbsp;<span class="detail-label">隶属</span>${r.a}</div>
            <div style="margin-top:4px"><span class="detail-label" style="background:#fef2f2;color:#c41230">预估薪资</span> ${r._salary||'暂无数据'} <span style="font-size:.75em;color:#888">（基于同城同系统近两年数据估算，仅供参考）</span></div>
            ${isSydw?`<div style="margin-top:4px"><span class="detail-label">主管部门</span>${r._dept||''}&nbsp;<span class="detail-label">经费</span>${r._fund||''}&nbsp;<span class="detail-label">招聘对象</span>${r._target||''}</div><div style="margin-top:3px"><span class="detail-label">考试形式</span>${r._examFmt||''}&nbsp;<span class="detail-label">咨询</span>${(r._contact||'').substring(0,60)}</div>`:''}
          </td>
        </tr>`;
      }).join('');
      if (results.length > 500) tbody.innerHTML += '<tr><td colspan="10" style="text-align:center;color:var(--text-secondary);padding:12px">仅展示前500条，请细化筛选条件</td></tr>';
    }

    // Cards
    const cl = document.getElementById('cardList');
    if (!results.length) {
      cl.innerHTML = '<div class="empty">没有匹配的职位</div>';
    } else {
      const slice = results.slice(0, 300);
      cl.innerHTML = slice.map(r => {
        const isFav = favorites.has(r._t + '|' + r.pc + '|' + r.un);
        const isSydw = r._t === 'sydw';
        return `<div class="card${isSydw?' sydw-card':''}">
          <div class="card-title">${r.pn}<span style="float:right" class="fav-btn${isFav?' active':''}" onclick="toggleFav('${r._t}|${r.pc}|${r.un}',this)">${isFav?'★':'☆'}</span></div>
          <div class="card-meta"><span>${r.an}</span><span class="type-badge ${isSydw?'type-sydw':'type-gwy'}">${isSydw?'事业':'公务员'}</span><span>${r.un}</span></div>
          <div class="card-meta"><span>${r.e}</span><span>招${r.n}人</span><span>${r.ed}</span></div>
          <div class="card-meta"><span>${r.m.substring(0,35)}</span></div>
          <div style="font-size:.72em;color:var(--text-secondary);margin-top:3px">${(r.pd||'').substring(0,80)}</div>
          ${isSydw?'<div style="font-size:.68em;color:#b45309;margin-top:2px">'+ (r._dept||'') + ' | ' + (r._fund||'') + '</div>':''}
        </div>`;
      }).join('');
    }

    updateHash();
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('resultsTable').style.display = '';
  }, 100);
}

function toggleDetail(idx, btn) {
  const row = document.getElementById('detail-' + idx);
  const open = row.classList.toggle('show');
  btn.textContent = open ? '收起' : '展开';
  const pr = document.getElementById('row-' + idx);
  if (pr) pr.classList.toggle('expanded', open);
}

function toggleFav(key, el) {
  if (favorites.has(key)) { favorites.delete(key); el.classList.remove('active'); el.textContent = '☆'; }
  else { favorites.add(key); el.classList.add('active'); el.textContent = '★'; }
  saveFavs();
  if (state.favOnly) render();
}

function setSort(field) { if(state.sortBy===field)state.sortAsc=!state.sortAsc; else{state.sortBy=field;state.sortAsc=true;} render(); }
function setType(type, el) {
  state.type = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  // Show/hide funding filter
  document.getElementById('fundingSection').style.display = (type==='sydw'||type==='all') ? '' : 'none';
  render();
}

function onFilterChange() {
  state.search = document.getElementById('searchInput').value.trim();
  state.favOnly = document.getElementById('favOnly').checked;
  state.recruitMin = parseInt(document.getElementById('recruitMin').value) || 1;
  state.recruitMax = parseInt(document.getElementById('recruitMax').value) || STATS.maxRecruit;
  render();
}

function resetFilters() {
  state.search=''; state.cities.clear(); state.majors.clear(); state.education.clear();
  state.exams.clear(); state.affiliations.clear(); state.funding.clear();
  state.recruitMin=1; state.recruitMax=STATS.maxRecruit;
  state.favOnly=false; state.sortBy=null; state.sortAsc=true; state.type='all';
  document.getElementById('searchInput').value=''; document.getElementById('favOnly').checked=false;
  document.getElementById('recruitMin').value=1; document.getElementById('recruitMax').value=STATS.maxRecruit;
  document.querySelectorAll('#cityFilters input[data-filter=city],#eduFilters input[data-filter=edu],#affilFilters input[data-filter=affil],#fundingFilters input[data-filter=funding]').forEach(cb=>cb.checked=false);
  document.querySelectorAll('#examFilters [data-filter=exam]').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#majorFilters [data-filter=major]').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.type-btn[data-type="all"]').classList.add('active');
  document.getElementById('fundingSection').style.display='';
  render();
}

function filterCategories(q) { document.querySelectorAll('#majorFilters .cat-pill').forEach(p=>{p.style.display=!q||p.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';}); }

function el(tag, attrs, html) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => { if (v != null) e[k] = v; });
  if (html) e.innerHTML = html;
  return e;
}

function buildFilterUI() {
  // ---- 城市 ----
  const cityEl = document.getElementById('cityFilters');
  cityEl.innerHTML = '';
  STATS.cities.forEach(c => {
    const cb = el('input', { type: 'checkbox' });
    cb._val = c.name;
    const label = el('label', { className: 'filter-option' });
    const span = el('span', { className: 'count', textContent: c.recruits });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(c.name));
    label.appendChild(span);
    cb.addEventListener('change', function() { render(); });
    cityEl.appendChild(label);
  });

  // ---- 专业大类 ----
  const majorEl = document.getElementById('majorFilters');
  majorEl.innerHTML = '';
  STATS.majorCategories.slice(0,35).forEach(m => {
    const pill = el('span', { className: 'cat-pill', textContent: m.name + ' ' });
    pill._val = m.name;
    const cnt = el('span', { style: 'opacity:.6;margin-left:2px', textContent: m.recruits });
    pill.appendChild(cnt);
    pill.addEventListener('click', function() {
this.classList.toggle('active'); render();
    });
    majorEl.appendChild(pill);
  });

  // ---- 学历 ----
  const eduEl = document.getElementById('eduFilters');
  eduEl.innerHTML = '';
  STATS.educationLevels.forEach(e => {
    const cb = el('input', { type: 'checkbox' });
    cb._val = e;
    const label = el('label', { className: 'filter-option' });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(e));
    cb.addEventListener('change', function() { render(); });
    eduEl.appendChild(label);
  });

  // ---- 考试类别 ----
  const examEl = document.getElementById('examFilters');
  examEl.innerHTML = '';
  STATS.examCategories.forEach(e => {
    const btn = el('button', { className: 'btn btn-outline btn-sm', textContent: e });
    btn._val = e;
    btn.addEventListener('click', function() {
this.classList.toggle('active'); render();
    });
    examEl.appendChild(btn);
  });

  // ---- 隶属关系 ----
  const affilEl = document.getElementById('affilFilters');
  affilEl.innerHTML = '';
  STATS.affiliations.forEach(a => {
    const cb = el('input', { type: 'checkbox' });
    cb._val = a;
    const label = el('label', { className: 'filter-option' });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(a));
    cb.addEventListener('change', function() { render(); });
    affilEl.appendChild(label);
  });

  // ---- 经费来源 ----
  const fundEl = document.getElementById('fundingFilters');
  fundEl.innerHTML = '';
  const funds = [...new Set(ALL_DATA.map(r=>r._fund).filter(Boolean))].sort();
  funds.forEach(f => {
    const cb = el('input', { type: 'checkbox' });
    cb._val = f;
    const label = el('label', { className: 'filter-option' });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(f));
    cb.addEventListener('change', function() { render(); });
    fundEl.appendChild(label);
  });

  document.getElementById('recruitMax').value = STATS.maxRecruit;
  document.getElementById('statPos').textContent = STATS.totalPositions.toLocaleString();
  document.getElementById('statRec').textContent = STATS.totalRecruits.toLocaleString();
}

// All filter toggles now handled by event delegation in buildFilterUI

function updateHash(){
  const p=[];
  if(state.search)p.push('q='+encodeURIComponent(state.search));
  if(state.cities.size)p.push('city='+[...state.cities].map(encodeURIComponent).join(','));
  if(state.majors.size)p.push('major='+[...state.majors].map(encodeURIComponent).join(','));
  if(state.education.size)p.push('edu='+[...state.education].map(encodeURIComponent).join(','));
  if(state.exams.size)p.push('exam='+[...state.exams].join(','));
  if(state.favOnly)p.push('fav=1');
  if(state.type!=='all')p.push('type='+state.type);
  history.replaceState(null,'','#'+p.join('&'));
}

function loadHash(){
  const h=location.hash.substring(1);if(!h)return;
  const p=new URLSearchParams(h);
  if(p.get('q')){state.search=p.get('q');document.getElementById('searchInput').value=state.search;}
  if(p.get('city'))state.cities=new Set(p.get('city').split(','));
  if(p.get('major'))state.majors=new Set(p.get('major').split(','));
  if(p.get('edu'))state.education=new Set(p.get('edu').split(','));
  if(p.get('exam'))state.exams=new Set(p.get('exam').split(','));
  if(p.get('fav'))state.favOnly=true;
  if(p.get('type')){state.type=p.get('type');}
  setTimeout(()=>{
    document.querySelectorAll('#cityFilters input[data-filter=city]').forEach(cb=>{if(state.cities.has(cb.value))cb.checked=true;});
    document.querySelectorAll('#majorFilters [data-filter=major]').forEach(p=>{if(state.majors.has(p.dataset.major))p.classList.add('active');});
    document.querySelectorAll('#eduFilters input[data-filter=edu]').forEach(cb=>{if(state.education.has(cb.value))cb.checked=true;});
    document.querySelectorAll('#examFilters [data-filter=exam]').forEach(b=>{if(state.exams.has(b.dataset.exam))b.classList.add('active');});
    document.getElementById('favOnly').checked=state.favOnly;
    const tb = document.querySelector('.type-btn[data-type="'+(state.type||'all')+'"]');
    if(tb){document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));tb.classList.add('active');}
  },50);
}

function exportToExcel(){
  const results=applyFilters();
  const rows=results.map(r=>({
    '类型':r._t==='gwy'?'公务员':'事业单位','地区':r.an,'单位':r.un,
    '职位名称':r.pn,'岗位类别':r.e,'招录人数':r.n,'学历':r.ed,'专业':r.m,
    '职位简介':r.pd,'其它':r.o,'开考比例':r.r,'隶属':r.a,
    '主管部门':r._dept||'','经费来源':r._fund||'','招聘对象':r._target||'','考试形式':r._examFmt||'','咨询电话':r._contact||'',
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'筛选结果');
  XLSX.writeFile(wb,`江苏公职招聘_筛选_${results.length}条.xlsx`);
}

function hideWechat(){document.getElementById('wxModal').classList.remove('show');}

function openChat(){if(window._MEIQIA){_MEIQIA('showPanel');}else{showWechat();}}

window.addEventListener('DOMContentLoaded',()=>{
  if(!ALL_DATA||!ALL_DATA.length){document.getElementById('loadingMsg').innerHTML='<div class="empty">数据加载失败</div>';return;}
  buildFilterUI(); loadHash(); render();
});
window.addEventListener('hashchange',()=>{loadHash();render();});
document.addEventListener('click',e=>{if(window.innerWidth<=768&&!e.target.closest('.sidebar')&&!e.target.closest('.filter-toggle'))document.getElementById('sidebar').classList.remove('open');});
</script>
